name = "pharmacy-vitamin-api"
main = "worker/src/index.ts"
compatibility_date = "2026-06-01"

# API_TOKEN is a secret, not a plain var — set locally via .dev.vars
# (gitignored) and remotely via `wrangler secret put API_TOKEN`.

[[d1_databases]]
binding = "DB"
database_name = "pharmacy-vitamin-db"
database_id = "275397aa-d943-4f3b-bc65-f403ff3e6756"
migrations_dir = "db/migrations"

# TODO: after running `wrangler r2 bucket create pharmacy-vitamin-images`,
# this binding works as-is against the real bucket too (no id to paste).
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "pharmacy-vitamin-images"
